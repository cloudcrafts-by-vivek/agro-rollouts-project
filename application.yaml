apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rollout-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/cloudcrafts-by-vivek/argo-rollouts-demo.git'
    path: rollout-app
    targetRevision: main
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: agrocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true